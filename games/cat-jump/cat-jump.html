<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cat Jump!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: linear-gradient(#87ceeb, #b0e0ff 70%, #6abf4b 70%, #4a8a36);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  h1 {
    color: white;
    text-shadow: 2px 2px 0 #333;
    margin: 4px 0;
    font-size: 22px;
  }
  #game {
    background: linear-gradient(#87ceeb, #b0e0ff 70%, #6abf4b 70%, #4a8a36);
    border: 4px solid #333;
    border-radius: 10px;
    box-shadow: 0 6px 0 #333;
    touch-action: manipulation;
    width: 98vw;
    height: auto;
    max-height: calc(100vh - 80px);
    display: block;
  }
  #info {
    color: white;
    text-shadow: 1px 1px 0 #333;
    font-size: 14px;
    margin-top: 4px;
    text-align: center;
  }
  .stage {
    position: relative;
    display: inline-block;
    line-height: 0;
  }
  #jumpBtn {
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 5px solid #333;
    background: radial-gradient(circle at 35% 30%, #ff8aa8, #ff3366);
    color: white;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #333;
    box-shadow: 0 6px 0 #333;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    z-index: 10;
    line-height: 1;
  }
  #jumpBtn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #333;
  }
  #pauseBtn {
    position: absolute;
    right: 16px;
    top: 16px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 4px solid #333;
    background: radial-gradient(circle at 35% 30%, #8ad3ff, #2a8bd8);
    color: white;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #333;
    box-shadow: 0 4px 0 #333;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    z-index: 10;
    line-height: 1;
  }
  #pauseBtn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #333;
  }
  #replayBtn {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, 60px);
    padding: 16px 32px;
    border-radius: 999px;
    border: 4px solid #333;
    background: radial-gradient(circle at 35% 30%, #8affa0, #2db855);
    color: white;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #222;
    box-shadow: 0 5px 0 #222;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    display: none;
    z-index: 20;
    line-height: 1;
  }
  #replayBtn:active {
    transform: translate(-50%, 64px);
    box-shadow: 0 1px 0 #222;
  }
  #homeLink {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, 130px);
    padding: 8px 18px;
    border-radius: 999px;
    border: 3px solid #333;
    background: white;
    color: #222;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 3px 0 #333;
    display: none;
    z-index: 20;
    line-height: 1;
  }
</style>
</head>
<body>
  <h1>🐱 Cat Jump! 🐱</h1>
  <div class="stage">
    <canvas id="game" width="1280" height="960"></canvas>
    <button id="jumpBtn" type="button">JUMP!</button>
    <button id="pauseBtn" type="button">⏸</button>
    <button id="replayBtn" type="button">🔁 Replay</button>
    <a id="homeLink" href="index.html">🏠 Home</a>
  </div>
  <div id="info">Tap JUMP (or press SPACE) · Hold JUMP to fly · 📱 Turn phone sideways for best view!</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const GROUND_Y = H * 0.78;

const cat = {
  x: 160,
  y: GROUND_Y,
  vy: 0,
  size: 80,
  jumping: false,
  jumpsLeft: 2,
  spin: 0,
  emoji: localStorage.getItem('selectedCat') || '🐱',
};

const GRAVITY = 1.1;
const JUMP_POWER = -33;

let monsters = [];
let platforms = [];
let mountains = [];
let pits = [];
let lavaBombs = [];
let bullets = [];
let level = 1;
let lastShot = -1000;
const LEVEL_FRAMES = 18000;        // 5 minutes @ 60fps
const SHOOT_INTERVAL = 600;        // 10 seconds @ 60fps
let score = 0;
let highScore = 0;
let gameOver = false;
let paused = false;
let jumpHeld = false;
let isFlying = false;
const FLY_MAX = 180;      // 3 seconds at 60fps
const FLY_REST = 300;     // 5 seconds rest
let flyStamina = FLY_MAX;
let flyRest = 0;
let gameSpeed = 6;
let frame = 0;
let clouds = [
  { x: 100, y: 60, size: 40 },
  { x: 400, y: 90, size: 30 },
  { x: 650, y: 50, size: 50 },
];

function jump() {
  if (gameOver) return; // use the Replay button
  if (cat.jumpsLeft > 0) {
    cat.vy = JUMP_POWER;
    cat.jumping = true;
    cat.jumpsLeft--;
  }
}

function resetGame() {
  monsters = [];
  platforms = [];
  mountains = [];
  pits = [];
  lavaBombs = [];
  bullets = [];
  level = 1;
  lastShot = -1000;
  cat.x = 160;
  score = 0;
  gameSpeed = 6;
  frame = 0;
  cat.y = GROUND_Y;
  cat.vy = 0;
  cat.jumping = false;
  cat.jumpsLeft = 2;
      isFlying = false;
  flyStamina = FLY_MAX;
  flyRest = 0;
  gameOver = false;
  paused = false;
  if (typeof pauseBtn !== 'undefined') pauseBtn.textContent = '⏸';
  if (typeof replayBtn !== 'undefined') {
    replayBtn.style.display = 'none';
    homeLink.style.display = 'none';
  }
}

function pressJump() { jumpHeld = true; jump(); }
function releaseJump() { jumpHeld = false; isFlying = false; }

document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'ArrowUp') && !e.repeat) {
    e.preventDefault();
    pressJump();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    releaseJump();
  }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); pressJump(); });
canvas.addEventListener('mouseup', e => { e.preventDefault(); releaseJump(); });
canvas.addEventListener('mouseleave', releaseJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); pressJump(); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); releaseJump(); }, { passive: false });
canvas.addEventListener('touchcancel', releaseJump);

const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); pressJump(); }, { passive: false });
jumpBtn.addEventListener('touchend', e => { e.preventDefault(); releaseJump(); }, { passive: false });
jumpBtn.addEventListener('touchcancel', releaseJump);
jumpBtn.addEventListener('mousedown', e => { e.preventDefault(); pressJump(); });
jumpBtn.addEventListener('mouseup', e => { e.preventDefault(); releaseJump(); });
jumpBtn.addEventListener('mouseleave', releaseJump);

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
}
const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('touchstart', e => { e.preventDefault(); togglePause(); }, { passive: false });
pauseBtn.addEventListener('mousedown', e => { e.preventDefault(); togglePause(); });

const replayBtn = document.getElementById('replayBtn');
const homeLink = document.getElementById('homeLink');
function doReplay(e) { e.preventDefault(); resetGame(); }
replayBtn.addEventListener('touchstart', doReplay, { passive: false });
replayBtn.addEventListener('mousedown', doReplay);
// hide the home link on standalone file mode
if (window.location.protocol === 'file:') homeLink.style.visibility = 'hidden';

function spawnMonster() {
  const types = ['👹', '👺', '👻', '🦖', '🐲'];
  monsters.push({
    x: W + 20,
    y: GROUND_Y,
    size: 72,
    emoji: types[Math.floor(Math.random() * types.length)],
  });
}

const PLATFORM_PICS = ['🌸', '⭐', '🍀', '🍎', '🐾'];

function makePlatform(x, y, width) {
  return {
    x,
    y,
    width,
    height: 58,
    pic: PLATFORM_PICS[Math.floor(Math.random() * PLATFORM_PICS.length)],
  };
}

function spawnPlatform() {
  const heights = [GROUND_Y - 140, GROUND_Y - 220, GROUND_Y - 300];
  platforms.push(makePlatform(
    W + 40,
    heights[Math.floor(Math.random() * heights.length)],
    210
  ));
}

function spawnStaircase() {
  const steps = 4;
  const startX = W + 40;
  const spacing = 290;
  const baseH = 130;
  const stepH = 95;
  for (let i = 0; i < steps; i++) {
    platforms.push(makePlatform(
      startX + i * spacing,
      GROUND_Y - (baseH + i * stepH),
      200
    ));
  }
  // big top "high place" platform (the reward)
  platforms.push(makePlatform(
    startX + steps * spacing + 40,
    GROUND_Y - (baseH + (steps - 1) * stepH),
    320
  ));
}

function spawnPit() {
  pits.push({
    x: W + 40,
    width: 140 + Math.random() * 100,
  });
}

function spawnMountain() {
  const isVolcano = Math.random() < 0.45;
  const w = 280 + Math.random() * 100;
  const h = 200 + Math.random() * 80;
  const m = { x: W + 60, width: w, height: h, isVolcano, lastErupt: 0 };
  mountains.push(m);
  if (!isVolcano) {
    // regular mountain: monster slides down from the peak
    const types = ['👹', '👺', '🦖', '👿'];
    monsters.push({
      x: m.x + w / 2,
      y: GROUND_Y - h,
      size: 62,
      emoji: types[Math.floor(Math.random() * types.length)],
      slidingDown: true,
    });
  }
}

function eruptVolcano(m) {
  const peakX = m.x + m.width / 2;
  const peakY = GROUND_Y - m.height;
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.9;
    const speed = 9 + Math.random() * 4;
    lavaBombs.push({
      x: peakX,
      y: peakY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 14,
      spin: Math.random() * Math.PI,
    });
  }
}

function mountainSurfaceAt(m, x) {
  if (x < m.x || x > m.x + m.width) return null;
  const halfW = m.width / 2;
  const peakX = m.x + halfW;
  if (x <= peakX) {
    return GROUND_Y - ((x - m.x) / halfW) * m.height;
  } else {
    return GROUND_Y - ((m.x + m.width - x) / halfW) * m.height;
  }
}

function spawnBird() {
  const types = ['🐦', '🦅', '🦉', '🦜'];
  const heights = [GROUND_Y - 220, GROUND_Y - 320, GROUND_Y - 420];
  monsters.push({
    x: W + 20,
    y: heights[Math.floor(Math.random() * heights.length)],
    size: 64,
    emoji: types[Math.floor(Math.random() * types.length)],
    flying: true,
    bobPhase: Math.random() * Math.PI * 2,
    baseY: 0,
  });
  const b = monsters[monsters.length - 1];
  b.baseY = b.y;
}

function update() {
  if (paused) return;
  frame++;

  // cat physics — flying kicks in only AFTER the jump reaches its peak
  const prevY = cat.y;
  // start flying once the jump's upward momentum is gone (cat is at/past peak)
  if (jumpHeld && !gameOver && cat.vy >= 0 && cat.jumping && flyRest === 0 && flyStamina > 0) {
    isFlying = true;
  }
  const canFly = isFlying && jumpHeld && !gameOver && flyRest === 0 && flyStamina > 0;
  if (canFly) {
    cat.vy -= 1.9; // strong lift (beats gravity)
    if (cat.vy < -9) cat.vy = -9;
    flyStamina--;
    if (flyStamina <= 0) {
      flyStamina = 0;
      flyRest = FLY_REST;
      isFlying = false;
    }
  } else if (flyRest > 0) {
    flyRest--;
    if (flyRest === 0) flyStamina = FLY_MAX;
  } else if (!isFlying && flyStamina < FLY_MAX) {
    // slow recharge while not flying
    flyStamina = Math.min(FLY_MAX, flyStamina + 0.8);
  }
  cat.vy += GRAVITY;
  cat.y += cat.vy;
  // don't fly above the top of the sky
  if (cat.y < 40) { cat.y = 40; if (cat.vy < 0) cat.vy = 0; }

  // dizzy spin while resting in the air
  if (flyRest > 0 && cat.y < GROUND_Y - 2 && cat.vy > -2) {
    cat.spin += 0.22;
  } else if (cat.y >= GROUND_Y - 2) {
    cat.spin = 0;
  }

  // land on platforms (only while falling)
  if (cat.vy >= 0) {
    const catLeft = cat.x - cat.size * 0.35;
    const catRight = cat.x + cat.size * 0.35;
    for (const p of platforms) {
      if (catRight > p.x && catLeft < p.x + p.width) {
        if (prevY <= p.y && cat.y >= p.y) {
          cat.y = p.y;
          cat.vy = 0;
          cat.jumping = false;
          cat.jumpsLeft = 2;
      isFlying = false;
        }
      }
    }
  }

  // mountain collision — land on top when falling, get stuck (pushed left) if blocked from the side
  for (const m of mountains) {
    const frontX = cat.x + 12;
    const surfY = mountainSurfaceAt(m, frontX);
    if (surfY === null) continue;
    if (cat.vy > 0 && cat.y >= surfY) {
      // landing on the mountain surface
      cat.y = surfY;
      cat.vy = 0;
      cat.jumping = false;
      cat.jumpsLeft = 2;
      isFlying = false;
    } else if (cat.vy <= 0 && cat.y > surfY) {
      // stuck against the slope — pushed left with the mountain
      cat.x -= gameSpeed;
      if (cat.x < 20) {
        gameOver = true;
        if (score > highScore) highScore = score;
      }
    }
  }

  // land on ground
  if (cat.y >= GROUND_Y) {
    cat.y = GROUND_Y;
    cat.vy = 0;
    cat.jumping = false;
    cat.jumpsLeft = 2;
      isFlying = false;
  }

  // cat recovers to normal x when not stuck (gentle drift back)
  if (cat.x < 160 && !mountains.some(m => mountainSurfaceAt(m, cat.x + 12) !== null && cat.y > mountainSurfaceAt(m, cat.x + 12))) {
    cat.x = Math.min(160, cat.x + 2);
  }

  // clouds
  for (const c of clouds) {
    c.x -= 1;
    if (c.x < -60) c.x = W + 60;
  }

  if (gameOver) return;

  // spawn monsters
  const spawnGap = Math.max(130, 180 - Math.floor(score / 20));
  if (frame % spawnGap === 0) spawnMonster();

  // spawn platforms — sometimes a staircase, sometimes a single floating block
  if (frame % 360 === 60) spawnStaircase();
  if (frame % 180 === 90 && Math.random() < 0.4) spawnPlatform();

  // spawn flying birds
  if (frame % 200 === 80 && Math.random() < 0.55) spawnBird();

  // spawn mountains (with a monster sliding down)
  if (frame === 120) spawnMountain(); // first one shows up quickly
  if (frame % 420 === 120 && score > 30) spawnMountain();

  // spawn lava pits
  if (frame % 360 === 260 && score > 60) spawnPit();

  // move mountains and pits
  for (const m of mountains) m.x -= gameSpeed;
  mountains = mountains.filter(m => m.x + m.width > -40);
  for (const p of pits) p.x -= gameSpeed;
  pits = pits.filter(p => p.x + p.width > -40);

  // volcano eruptions
  for (const m of mountains) {
    if (!m.isVolcano) continue;
    if (m.x + m.width < 0 || m.x > W) continue; // only erupt when visible-ish
    if (frame - m.lastErupt > 100 + Math.random() * 40) {
      m.lastErupt = frame;
      eruptVolcano(m);
    }
  }

  // lava bombs physics
  for (const b of lavaBombs) {
    b.x += b.vx - gameSpeed;
    b.y += b.vy;
    b.vy += 0.55;
  }
  lavaBombs = lavaBombs.filter(b => b.y < H + 40 && b.x > -40 && b.x < W + 40);

  // lava bomb collision with cat
  for (const b of lavaBombs) {
    const dx = Math.abs(cat.x - b.x);
    const dy = Math.abs(cat.y - 20 - b.y);
    if (dx < 30 && dy < 30) {
      gameOver = true;
      if (score > highScore) highScore = score;
      break;
    }
  }

  // pit collision — if the cat is on the ground over a pit, game over
  for (const p of pits) {
    if (cat.x > p.x && cat.x < p.x + p.width && cat.y >= GROUND_Y - 2) {
      gameOver = true;
      if (score > highScore) highScore = score;
      break;
    }
  }

  // move monsters (birds bob, mountain monsters slide down)
  for (const m of monsters) {
    m.x -= gameSpeed;
    if (m.flying) {
      m.y = m.baseY + Math.sin((frame + m.bobPhase * 10) * 0.08) * 18;
    }
    if (m.slidingDown) {
      m.x -= 2.5;
      m.y += 3.8;
      if (m.y >= GROUND_Y) {
        m.y = GROUND_Y;
        m.slidingDown = false;
      }
    }
  }
  monsters = monsters.filter(m => m.x > -60);

  // move platforms
  for (const p of platforms) p.x -= gameSpeed;
  platforms = platforms.filter(p => p.x + p.width > -20);

  // collisions
  for (const m of monsters) {
    const dx = Math.abs(cat.x - m.x);
    const dy = Math.abs(cat.y - m.y);
    if (dx < 35 && dy < 35) {
      gameOver = true;
      if (score > highScore) highScore = score;
      break;
    }
  }

  // score & level & speed up
  score++;
  // level advances once per 5 minutes of survival, capped at 5
  level = Math.min(5, Math.floor(frame / LEVEL_FRAMES) + 1);
  gameSpeed = 6 + Math.min(6, score / 400);

  // level 5 shooter — auto-fires every 10 seconds
  if (level >= 5 && frame - lastShot >= SHOOT_INTERVAL) {
    lastShot = frame;
    bullets.push({
      x: cat.x + cat.size * 0.4,
      y: cat.y - cat.size * 0.4,
      vx: 14,
      size: 14,
      life: 0,
    });
  }

  // move bullets
  for (const b of bullets) { b.x += b.vx; b.life++; }
  bullets = bullets.filter(b => b.x < W + 40);

  // bullet–monster collisions
  for (const b of bullets) {
    if (b.hit) continue;
    for (const m of monsters) {
      if (m.hit) continue;
      const dx = Math.abs(b.x - m.x);
      const dy = Math.abs(b.y - (m.y - 20));
      if (dx < 35 && dy < 35) {
        m.hit = true;
        b.hit = true;
        score += 25;
        break;
      }
    }
  }
  monsters = monsters.filter(m => !m.hit);
  bullets = bullets.filter(b => !b.hit);
}

function drawBlackCat(ctx, cx, by, size) {
  const s = size;

  // tail (curves back and up, behind the cat)
  ctx.strokeStyle = '#0c0c0c';
  ctx.lineWidth = s * 0.13;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - s * 0.3, by - s * 0.25);
  ctx.quadraticCurveTo(cx - s * 0.7, by - s * 0.7, cx - s * 0.35, by - s * 0.8);
  ctx.stroke();

  ctx.fillStyle = '#121212';

  // body (oval, extended right since cat faces right)
  ctx.beginPath();
  ctx.ellipse(cx, by - s * 0.25, s * 0.4, s * 0.23, 0, 0, Math.PI * 2);
  ctx.fill();

  // back legs
  ctx.beginPath();
  ctx.ellipse(cx - s * 0.28, by - s * 0.08, s * 0.08, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  // front legs (on the right)
  ctx.beginPath();
  ctx.ellipse(cx + s * 0.2, by - s * 0.08, s * 0.075, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + s * 0.33, by - s * 0.08, s * 0.075, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // head (on the right side)
  const headX = cx + s * 0.33;
  const headY = by - s * 0.55;
  const headR = s * 0.24;
  ctx.beginPath();
  ctx.arc(headX, headY, headR, 0, Math.PI * 2);
  ctx.fill();

  // snout (pushes slightly right)
  ctx.beginPath();
  ctx.ellipse(headX + headR * 0.55, headY + headR * 0.18, headR * 0.5, headR * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();

  // ears (two triangles on top)
  ctx.beginPath();
  ctx.moveTo(headX - headR * 0.6, headY - headR * 0.35);
  ctx.lineTo(headX - headR * 0.3, headY - headR * 1.15);
  ctx.lineTo(headX - headR * 0.05, headY - headR * 0.55);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX + headR * 0.05, headY - headR * 0.55);
  ctx.lineTo(headX + headR * 0.35, headY - headR * 1.15);
  ctx.lineTo(headX + headR * 0.65, headY - headR * 0.35);
  ctx.closePath();
  ctx.fill();

  // inner ear hint (dark pink)
  ctx.fillStyle = '#7a2a3a';
  ctx.beginPath();
  ctx.moveTo(headX - headR * 0.4, headY - headR * 0.55);
  ctx.lineTo(headX - headR * 0.3, headY - headR * 0.95);
  ctx.lineTo(headX - headR * 0.18, headY - headR * 0.6);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX + headR * 0.18, headY - headR * 0.6);
  ctx.lineTo(headX + headR * 0.3, headY - headR * 0.95);
  ctx.lineTo(headX + headR * 0.4, headY - headR * 0.55);
  ctx.closePath();
  ctx.fill();

  // green eyes — looking right
  const eyeR = headR * 0.24;
  const leftEyeX = headX - headR * 0.08;
  const rightEyeX = headX + headR * 0.42;
  const eyeY = headY - headR * 0.08;

  // eye whites (subtle glow)
  ctx.fillStyle = '#58e040';
  ctx.beginPath();
  ctx.arc(leftEyeX, eyeY, eyeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(rightEyeX, eyeY, eyeR, 0, Math.PI * 2);
  ctx.fill();

  // pupils (vertical slits, pushed right to show cat looking right)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(leftEyeX + eyeR * 0.35, eyeY, eyeR * 0.25, eyeR * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(rightEyeX + eyeR * 0.35, eyeY, eyeR * 0.25, eyeR * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // tiny eye shines
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(leftEyeX + eyeR * 0.55, eyeY - eyeR * 0.3, eyeR * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(rightEyeX + eyeR * 0.55, eyeY - eyeR * 0.3, eyeR * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // nose (pink)
  ctx.fillStyle = '#ff99bb';
  ctx.beginPath();
  ctx.arc(headX + headR * 1.0, headY + headR * 0.1, headR * 0.09, 0, Math.PI * 2);
  ctx.fill();

  // whiskers
  ctx.strokeStyle = '#dddddd';
  ctx.lineWidth = 1.6;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(headX + headR * 0.65, headY + headR * 0.22 + i * 3);
    ctx.lineTo(headX + headR * 1.45, headY + headR * 0.15 + i * 7);
    ctx.stroke();
  }
}

function roundedRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function draw() {
  // sky + ground via canvas (in case CSS fails)
  ctx.clearRect(0, 0, W, H);

  // sky
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(1, '#cbeaff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // clouds
  ctx.fillStyle = '#fff';
  for (const c of clouds) {
    ctx.font = c.size + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    ctx.fillText('☁️', c.x, c.y);
  }

  // ground
  ctx.fillStyle = '#6abf4b';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#4a8a36';
  ctx.fillRect(0, GROUND_Y, W, 6);

  // lava pits (cut out ground and draw lava)
  for (const p of pits) {
    // dig out the ground
    ctx.fillStyle = '#2a1510';
    ctx.fillRect(p.x, GROUND_Y, p.width, H - GROUND_Y);
    // lava surface
    const lavaGrad = ctx.createLinearGradient(0, GROUND_Y, 0, GROUND_Y + 40);
    lavaGrad.addColorStop(0, '#ffd84a');
    lavaGrad.addColorStop(0.4, '#ff7a1a');
    lavaGrad.addColorStop(1, '#c21818');
    ctx.fillStyle = lavaGrad;
    ctx.fillRect(p.x + 4, GROUND_Y + 8, p.width - 8, 40);
    // bubbles (animated)
    ctx.fillStyle = '#ffe88a';
    for (let i = 0; i < 4; i++) {
      const bx = p.x + 20 + ((i * 40 + frame * 1.2) % (p.width - 40));
      const by = GROUND_Y + 18 + Math.sin(frame * 0.2 + i) * 4;
      ctx.beginPath();
      ctx.arc(bx, by, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    // dark edges
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(p.x, GROUND_Y);
    ctx.lineTo(p.x, GROUND_Y + 10);
    ctx.moveTo(p.x + p.width, GROUND_Y);
    ctx.lineTo(p.x + p.width, GROUND_Y + 10);
    ctx.stroke();
  }

  // little grass tufts
  ctx.fillStyle = '#4a8a36';
  for (let i = 0; i < 20; i++) {
    const gx = ((i * 50 - frame * 2) % W + W) % W;
    ctx.fillRect(gx, GROUND_Y + 8, 3, 6);
    ctx.fillRect(gx + 5, GROUND_Y + 10, 3, 4);
  }

  // mountains (drawn BEHIND platforms and cat)
  for (const m of mountains) {
    const peakX = m.x + m.width / 2;
    const peakY = GROUND_Y - m.height;
    // body
    ctx.beginPath();
    ctx.moveTo(m.x, GROUND_Y);
    ctx.lineTo(peakX, peakY);
    ctx.lineTo(m.x + m.width, GROUND_Y);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, peakY, 0, GROUND_Y);
    if (m.isVolcano) {
      grad.addColorStop(0, '#8a3a2a');
      grad.addColorStop(0.4, '#5a2418');
      grad.addColorStop(1, '#2a140c');
    } else {
      grad.addColorStop(0, '#a9b4c0');
      grad.addColorStop(0.4, '#707d8d');
      grad.addColorStop(1, '#455060');
    }
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = m.isVolcano ? '#1a0a06' : '#2a3442';
    ctx.lineWidth = 3;
    ctx.stroke();

    if (m.isVolcano) {
      // lava streaks trickling down the sides
      ctx.strokeStyle = '#ff5a1a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(peakX - 8, peakY + 6);
      ctx.quadraticCurveTo(peakX - 30, peakY + 60, peakX - 50, peakY + 120);
      ctx.moveTo(peakX + 8, peakY + 6);
      ctx.quadraticCurveTo(peakX + 40, peakY + 50, peakX + 60, peakY + 110);
      ctx.stroke();
      // glowing crater at the top
      const craterW = Math.min(40, m.width * 0.12);
      const craterH = 14;
      ctx.fillStyle = '#ff2a00';
      ctx.beginPath();
      ctx.ellipse(peakX, peakY + 4, craterW, craterH, 0, 0, Math.PI * 2);
      ctx.fill();
      const glow = ctx.createRadialGradient(peakX, peakY + 4, 2, peakX, peakY + 4, craterW);
      glow.addColorStop(0, '#ffffa0');
      glow.addColorStop(0.6, '#ff7a10');
      glow.addColorStop(1, '#c01010');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(peakX, peakY + 4, craterW * 0.75, craterH * 0.75, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // snow cap
      const snowFrac = 0.35;
      const snowBottomY = peakY + m.height * snowFrac;
      const snowOffset = (m.width / 2) * snowFrac;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.moveTo(peakX - snowOffset, snowBottomY);
      ctx.quadraticCurveTo(peakX - snowOffset * 0.5, snowBottomY + 10, peakX, snowBottomY - 5);
      ctx.quadraticCurveTo(peakX + snowOffset * 0.5, snowBottomY + 12, peakX + snowOffset, snowBottomY);
      ctx.lineTo(peakX, peakY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b8c8d8';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // bullets (energy orbs shot by the level-5 cat)
  for (const b of bullets) {
    ctx.fillStyle = 'rgba(120,220,255,0.45)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size + 8, 0, Math.PI * 2);
    ctx.fill();
    const grad = ctx.createRadialGradient(b.x - 3, b.y - 3, 2, b.x, b.y, b.size);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.5, '#58d8ff');
    grad.addColorStop(1, '#1a6abf');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#0a3a6a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(b.x - 12, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // lava bombs
  for (const b of lavaBombs) {
    // glow
    ctx.fillStyle = 'rgba(255,140,50,0.45)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size + 8, 0, Math.PI * 2);
    ctx.fill();
    // bomb body
    const bg = ctx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, b.size);
    bg.addColorStop(0, '#ffff90');
    bg.addColorStop(0.5, '#ff7a10');
    bg.addColorStop(1, '#8a0a0a');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4a0a00';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // floating platforms (rounded blocks with a picture)
  for (const p of platforms) {
    const r = 14;
    // shadow
    roundedRectPath(ctx, p.x + 3, p.y + 5, p.width, p.height, r);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fill();
    // block body (soft yellow)
    const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
    grad.addColorStop(0, '#fff3a8');
    grad.addColorStop(1, '#ffcb57');
    roundedRectPath(ctx, p.x, p.y, p.width, p.height, r);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#7a4a10';
    ctx.lineWidth = 3;
    ctx.stroke();
    // picture centered
    ctx.fillStyle = '#222';
    ctx.font = '40px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.pic, p.x + p.width / 2, p.y + p.height / 2 + 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
  }

  // cat (drawn black cat if picked, otherwise emoji) — spins when resting in air
  ctx.save();
  if (cat.spin !== 0) {
    ctx.translate(cat.x, cat.y - cat.size / 2);
    ctx.rotate(cat.spin);
    if (cat.emoji === 'CUSTOM_BLACK') {
      drawBlackCat(ctx, 0, cat.size / 2 + 4, cat.size);
    } else {
      ctx.fillStyle = '#000';
      ctx.font = cat.size + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
      ctx.textBaseline = 'bottom';
      ctx.fillText(cat.emoji, -cat.size / 2, cat.size / 2 + 5);
    }
  } else if (cat.emoji === 'CUSTOM_BLACK') {
    drawBlackCat(ctx, cat.x, cat.y + 4, cat.size);
  } else {
    ctx.fillStyle = '#000';
    ctx.font = cat.size + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText(cat.emoji, cat.x - cat.size / 2, cat.y + 5);
  }
  ctx.restore();

  // monsters
  ctx.fillStyle = '#000';
  for (const m of monsters) {
    ctx.font = m.size + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    ctx.fillText(m.emoji, m.x - m.size / 2, m.y + 5);
  }

  // score
  ctx.fillStyle = '#222';
  ctx.font = 'bold 22px Arial';
  ctx.textBaseline = 'top';
  ctx.fillText('Score: ' + score, 20, 15);
  ctx.fillText('Best: ' + highScore, 20, 42);
  // level badge
  ctx.fillStyle = level >= 5 ? '#c02060' : '#2a5aa0';
  ctx.fillText('Level ' + level + (level >= 5 ? ' 🔫' : ''), 200, 15);
  // time left in this level (or reload countdown when level 5)
  ctx.font = 'bold 14px Arial';
  if (level < 5) {
    const framesLeft = LEVEL_FRAMES - (frame % LEVEL_FRAMES);
    const totalSec = Math.ceil(framesLeft / 60);
    const mm = Math.floor(totalSec / 60);
    const ss = totalSec % 60;
    ctx.fillStyle = '#333';
    ctx.fillText('Next: ' + mm + ':' + String(ss).padStart(2, '0'), 200, 44);
  } else {
    const sinceShot = frame - lastShot;
    const ready = sinceShot >= SHOOT_INTERVAL;
    ctx.fillStyle = ready ? '#1ab85a' : '#888';
    const secs = Math.max(0, Math.ceil((SHOOT_INTERVAL - sinceShot) / 60));
    ctx.fillText(ready ? 'Ready!' : 'Reload: ' + secs + 's', 200, 44);
  }
  // fly stamina bar
  {
    const barX = 20;
    const barY = 74;
    const barW = 240;
    const barH = 20;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    const resting = flyRest > 0;
    const pct = resting ? (1 - flyRest / FLY_REST) : (flyStamina / FLY_MAX);
    ctx.fillStyle = resting ? '#b83a3a' : '#3abf6a';
    ctx.fillRect(barX, barY, barW * pct, barH);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px Arial';
    ctx.textBaseline = 'top';
    ctx.fillText(resting ? '💤 Resting…' : '✈️ Fly', barX + 8, barY + 2);
  }

  // paused screen
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.font = 'bold 60px Arial';
    ctx.fillText('⏸ Paused', W / 2, H / 2);
    ctx.font = '22px Arial';
    ctx.fillText('Tap ▶ to keep playing', W / 2, H / 2 + 44);
    ctx.textAlign = 'left';
  }

  // game over screen
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.font = 'bold 56px Arial';
    ctx.fillText('Game Over!', W / 2, H / 2 - 70);
    ctx.font = '28px Arial';
    ctx.fillText('Score: ' + score + '  ·  Best: ' + highScore, W / 2, H / 2 - 20);
    ctx.textAlign = 'left';
    if (replayBtn.style.display !== 'block') {
      replayBtn.style.display = 'block';
      homeLink.style.display = 'block';
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
