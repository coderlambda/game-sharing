<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Games! 🎮</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #fbc2eb 50%, #a18cd1 75%, #84fab0 100%);
    background-attachment: fixed;
  }
  .wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    text-align: center;
  }
  h1 {
    color: white;
    text-shadow: 3px 3px 0 #333, -1px -1px 0 #333, 1px -1px 0 #333, -1px 1px 0 #333;
    font-size: 44px;
    margin: 20px 0 6px;
  }
  .subtitle {
    color: white;
    text-shadow: 2px 2px 0 #333;
    font-size: 18px;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 520px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: white;
    border: 4px solid #333;
    border-radius: 18px;
    box-shadow: 0 6px 0 #333;
    padding: 18px 14px 16px;
    text-decoration: none;
    color: #222;
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #333;
  }
  .card.coming {
    background: rgba(255,255,255,0.4);
    color: #555;
    border-style: dashed;
    box-shadow: none;
    cursor: default;
  }
  .icon {
    font-size: 64px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .desc {
    font-size: 14px;
    color: #555;
    margin-bottom: 12px;
    min-height: 2.6em;
  }
  .play {
    background: #ff5577;
    color: white;
    border: 3px solid #333;
    border-radius: 999px;
    padding: 8px 22px;
    font-size: 18px;
    font-weight: bold;
    box-shadow: 0 3px 0 #333;
  }
  .card.coming .play {
    background: #aaa;
    color: white;
  }
  .footer {
    color: white;
    text-shadow: 1px 1px 0 #333;
    margin-top: 28px;
    font-size: 14px;
  }
  .picker {
    background: white;
    border: 4px solid #333;
    border-radius: 18px;
    box-shadow: 0 6px 0 #333;
    padding: 14px;
    margin-bottom: 20px;
  }
  .picker h2 {
    margin: 0 0 10px;
    font-size: 20px;
    color: #222;
  }
  .cats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  .cat-btn {
    background: #fff7d6;
    border: 3px solid #333;
    border-radius: 14px;
    padding: 6px 10px;
    font-size: 36px;
    cursor: pointer;
    box-shadow: 0 3px 0 #333;
    transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 60px;
    min-height: 60px;
  }
  .cat-btn canvas {
    display: block;
  }
  .cat-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #333;
  }
  .cat-btn.selected {
    background: #ffd86b;
    transform: translateY(2px);
    box-shadow: 0 1px 0 #333, 0 0 0 4px #ff5577;
  }
  .picked {
    margin-top: 10px;
    font-size: 16px;
    color: #444;
  }
  .levels {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .level-btn {
    background: #fff;
    border: 3px solid #333;
    border-radius: 14px;
    padding: 12px 6px;
    text-decoration: none;
    color: #222;
    box-shadow: 0 4px 0 #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .level-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #333;
  }
  .level-btn.unlocked {
    background: linear-gradient(#d6f5ff, #7cd1ff);
  }
  .level-btn.beaten {
    background: linear-gradient(#ddffe0, #7cdd8b);
  }
  .level-btn.locked {
    background: #d6d6d6;
    color: #666;
    cursor: not-allowed;
    box-shadow: 0 2px 0 #777;
  }
  .level-btn .level-num {
    font-size: 28px;
    font-weight: bold;
    line-height: 1;
  }
  .level-btn .level-label {
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🎮 My Games! 🎮</h1>
    <div class="subtitle">Pick a game to play!</div>

    <div class="picker">
      <h2>🐾 Pick your cat!</h2>
      <div class="cats" id="cats">
        <button class="cat-btn" data-cat="🐱">🐱</button>
        <button class="cat-btn" data-cat="🐈">🐈</button>
        <button class="cat-btn" data-cat="🐈‍⬛">🐈‍⬛</button>
        <button class="cat-btn" data-cat="😺">😺</button>
        <button class="cat-btn" data-cat="😸">😸</button>
        <button class="cat-btn" data-cat="😻">😻</button>
        <button class="cat-btn" data-cat="🐯">🐯</button>
        <button class="cat-btn" data-cat="🦁">🦁</button>
        <button class="cat-btn" data-cat="CUSTOM_BLACK" title="Black cat with green eyes">
          <canvas id="blackCatPreview" width="80" height="70"></canvas>
        </button>
      </div>
      <div class="picked">Your cat: <span id="picked">🐱</span></div>
    </div>

    <div class="picker">
      <h2>🎚️ Pick a level!</h2>
      <div class="levels" id="levels">
        <a class="level-btn" data-level="1" href="cat-jump.html?level=1">
          <div class="level-num">1</div>
          <div class="level-label">Start</div>
        </a>
        <a class="level-btn" data-level="2" href="cat-jump.html?level=2">
          <div class="level-num">2</div>
          <div class="level-label">🔒</div>
        </a>
        <a class="level-btn" data-level="3" href="cat-jump.html?level=3">
          <div class="level-num">3</div>
          <div class="level-label">🔒</div>
        </a>
        <a class="level-btn" data-level="4" href="cat-jump.html?level=4">
          <div class="level-num">4</div>
          <div class="level-label">🔒</div>
        </a>
        <a class="level-btn" data-level="5" href="cat-jump.html?level=5">
          <div class="level-num">5</div>
          <div class="level-label">🔒</div>
        </a>
      </div>
    </div>

    <div class="footer">Made by you and Claude 💛</div>
  </div>

<script>
function drawBlackCat(ctx, cx, by, size) {
  const s = size;
  ctx.strokeStyle = '#0c0c0c';
  ctx.lineWidth = s * 0.13;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - s * 0.3, by - s * 0.25);
  ctx.quadraticCurveTo(cx - s * 0.7, by - s * 0.7, cx - s * 0.35, by - s * 0.8);
  ctx.stroke();
  ctx.fillStyle = '#121212';
  ctx.beginPath();
  ctx.ellipse(cx, by - s * 0.25, s * 0.4, s * 0.23, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - s * 0.28, by - s * 0.08, s * 0.08, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + s * 0.2, by - s * 0.08, s * 0.075, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + s * 0.33, by - s * 0.08, s * 0.075, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  const headX = cx + s * 0.33;
  const headY = by - s * 0.55;
  const headR = s * 0.24;
  ctx.beginPath();
  ctx.arc(headX, headY, headR, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(headX + headR * 0.55, headY + headR * 0.18, headR * 0.5, headR * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX - headR * 0.6, headY - headR * 0.35);
  ctx.lineTo(headX - headR * 0.3, headY - headR * 1.15);
  ctx.lineTo(headX - headR * 0.05, headY - headR * 0.55);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX + headR * 0.05, headY - headR * 0.55);
  ctx.lineTo(headX + headR * 0.35, headY - headR * 1.15);
  ctx.lineTo(headX + headR * 0.65, headY - headR * 0.35);
  ctx.closePath();
  ctx.fill();
  const eyeR = headR * 0.24;
  const leftEyeX = headX - headR * 0.08;
  const rightEyeX = headX + headR * 0.42;
  const eyeY = headY - headR * 0.08;
  ctx.fillStyle = '#58e040';
  ctx.beginPath();
  ctx.arc(leftEyeX, eyeY, eyeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(rightEyeX, eyeY, eyeR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(leftEyeX + eyeR * 0.35, eyeY, eyeR * 0.25, eyeR * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(rightEyeX + eyeR * 0.35, eyeY, eyeR * 0.25, eyeR * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff99bb';
  ctx.beginPath();
  ctx.arc(headX + headR * 1.0, headY + headR * 0.1, headR * 0.09, 0, Math.PI * 2);
  ctx.fill();
}

// draw preview in the picker
(function () {
  const c = document.getElementById('blackCatPreview');
  const g = c.getContext('2d');
  drawBlackCat(g, 38, 66, 52);
})();

  const saved = localStorage.getItem('selectedCat') || '🐱';
  document.getElementById('picked').textContent = saved === 'CUSTOM_BLACK' ? '🖤 Black cat with green eyes' : saved;
  for (const btn of document.querySelectorAll('.cat-btn')) {
    if (btn.dataset.cat === saved) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      localStorage.setItem('selectedCat', cat);
      document.getElementById('picked').textContent = cat === 'CUSTOM_BLACK' ? '🖤 Black cat with green eyes' : cat;
      for (const b of document.querySelectorAll('.cat-btn')) b.classList.remove('selected');
      btn.classList.add('selected');
    });
  }

  // level gating
  const highestBeaten = parseInt(localStorage.getItem('catJumpHighestBeaten') || '0', 10);
  for (const btn of document.querySelectorAll('.level-btn')) {
    const lvl = parseInt(btn.dataset.level, 10);
    const label = btn.querySelector('.level-label');
    if (lvl > highestBeaten + 1) {
      btn.classList.add('locked');
      btn.addEventListener('click', e => e.preventDefault());
      label.textContent = '🔒';
    } else if (lvl <= highestBeaten) {
      btn.classList.add('beaten');
      label.textContent = '✓ Beaten';
    } else {
      btn.classList.add('unlocked');
      label.textContent = lvl === 1 ? 'Start' : '▶ Play';
    }
  }
</script>
</body>
</html>
